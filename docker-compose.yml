services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - renewcred

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/renewcred_cms
      JWT_SECRET: local-dev-renewcred-secret-change-me
      JWT_EXPIRES_IN: 8h
      ADMIN_EMAIL: admin@renewcred.local
      ADMIN_PASSWORD: ChangeMe123!
      ADMIN_NAME: RenewCred Admin
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run seed && npm run dev"
    networks:
      - renewcred

  admin-frontend:
    build:
      context: ./admin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    volumes:
      - ./admin-frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - renewcred

  public-frontend:
    build:
      context: ./public-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      INTERNAL_API_URL: http://backend:4000/api/v1
    volumes:
      - ./public-frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    networks:
      - renewcred

volumes:
  mongo-data:

networks:
  renewcred:
    driver: bridge
